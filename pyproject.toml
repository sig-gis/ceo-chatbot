[project]
name = "ceo-chatbot"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "langchain>=1.0.5",
    "langchain-community>=0.4.1",
    "pandoc>=2.4",
    "pytest>=8.4.2",
    "tiktoken>=0.12.0",
    "unstructured[rst]>=0.18.18",
]

[dependency-groups]
dev = [
    "ipykernel>=7.1.0",
    "uv>=0.9.7",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
